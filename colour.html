<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:10px;
    width:300px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

.input-box{
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    outline:none;
}

.input-box input:focus{
    border-color:#4facfe;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#4facfe;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2f80ed;
}

.signup{
    text-align:center;
    margin-top:15px;
}

.signup a{
    text-decoration:none;
    color:#4facfe;
}
</style>

</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <form>
        <div class="input-box">
            <input type="text" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>

        <div class="signup">
            Don't have an account? <a href="#">Sign Up</a>
        </div>
    </form>
</div>

</body>
</html>
